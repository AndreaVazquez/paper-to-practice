<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}From Paper to Practice{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Light palette (sole theme) ────────────────────────────────────────── */
    :root {
      /* Semantic — all ≥6:1 on white, WCAG AA for small text */
      --academic:        #0369a1;  --academic-border: #0369a1;  --academic-bg: #e0f2fe;
      --repo:            #7c3aed;  --repo-border:     #7c3aed;  --repo-bg:     #ede9fe;
      --bridge:          #0f766e;  --bridge-border:   #0f766e;  --bridge-bg:   #f0fdfa;
      /* Neutrals */
      --bg:              #f0f4f8;
      --surface:         #ffffff;
      --surface2:        #f8fafc;
      --border:          #d1d9e6;
      --muted:           #475569;   /* 6.69:1 on white */
      --text:            #1e293b;   /* ~13:1 on white */
      --text-dim:        #334155;   /* ~9:1 on white */
      --heading:         #0f172a;   /* ~18:1 on white */
      --logo-color:      #0f172a;
      --logo-fold:       rgba(0,0,0,0.12);
      /* Plotly */
      --plot-font:       #475569;
      --plot-grid:       #e2e8f0;
      --plot-bg:         rgba(248,250,252,0);
      /* Alerts */
      --alert-danger-bg: #fef2f2;  --alert-danger-border: #fca5a5;  --alert-danger-color: #991b1b;
      --alert-info-bg:   #eff6ff;  --alert-info-border:   #93c5fd;  --alert-info-color:   #1d4ed8;
      /* Drift badges */
      --drift-none-bg:   #f0fdfa;  --drift-none-color:  #0f766e;  --drift-none-border:  #5eead4;
      --drift-minor-bg:  #fffbeb;  --drift-minor-color: #92400e;  --drift-minor-border: #fcd34d;
      --drift-major-bg:  #fef2f2;  --drift-major-color: #991b1b;  --drift-major-border: #fca5a5;
    }

    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 1rem;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--surface) !important;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .navbar-brand { display: flex; align-items: center; }
    .navbar-logo { height: 36px; width: auto; color: var(--logo-color); }
    .nav-link {
      font-size: 13px; letter-spacing: 1.5px; color: var(--muted) !important;
      text-transform: uppercase; transition: color .15s;
      padding: 6px 12px; border-radius: 0;
    }
    .nav-link:hover { color: var(--academic) !important; }
    .nav-link.active {
      color: var(--heading) !important;
      font-weight: 800;
      text-decoration: underline;
      text-decoration-color: var(--bridge);
      text-underline-offset: 4px;
      text-decoration-thickness: 2px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.03);
    }
    .card-header {
      background: var(--surface2); border-bottom: 1px solid var(--border);
      font-size: 12px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;
    }

    /* ── Stat cards ── */
    .stat-card { border-left: 3px solid; }
    .stat-card.academic { border-color: var(--academic-border); }
    .stat-card.repo     { border-color: var(--repo-border); }
    .stat-card.bridge   { border-color: var(--bridge-border); }
    .stat-card.neutral  { border-color: var(--border); }
    .stat-label { font-size: 12px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-value.academic { color: var(--academic); }
    .stat-value.repo     { color: var(--repo); }
    .stat-value.bridge   { color: var(--bridge); }
    .stat-value.neutral  { color: var(--text); }

    /* ── Section labels ── */
    .section-label { font-size: 12px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }

    /* ── Drift badges ── */
    .drift-none  { background: var(--drift-none-bg);  color: var(--drift-none-color);  border: 1px solid var(--drift-none-border);  border-left: 3px solid var(--drift-none-color);  font-size: 12px; letter-spacing: 1px; padding: 3px 8px; border-radius: 3px; font-weight: 700; }
    .drift-minor { background: var(--drift-minor-bg); color: var(--drift-minor-color); border: 1px solid var(--drift-minor-border); border-left: 3px solid var(--drift-minor-color); font-size: 12px; letter-spacing: 1px; padding: 3px 8px; border-radius: 3px; font-weight: 700; }
    .drift-major { background: var(--drift-major-bg); color: var(--drift-major-color); border: 1px solid var(--drift-major-border); border-left: 3px solid var(--drift-major-color); font-size: 12px; letter-spacing: 1px; padding: 3px 8px; border-radius: 3px; font-weight: 700; }

    /* ── Figure thumbnails ── */
    .figure-thumb { width: 120px; height: 90px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; transition: border-color .2s; }
    .figure-thumb:hover { border-color: var(--academic); }

    /* ── Narrative card ── */
    .narrative-card {
      border-left: 3px solid var(--bridge-border); background: var(--surface2);
      padding: 14px 16px; border-radius: 0 4px 4px 0; margin-bottom: 12px;
      border: 1px solid var(--border); border-left-width: 3px;
    }
    .narrative-meta { font-size: 12px; color: var(--muted); letter-spacing: 1px; margin-top: 8px; }

    /* ── Form controls ── */
    .form-control, .form-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .875rem;
    }
    .form-control:focus, .form-select:focus {
      background: var(--surface);
      border-color: var(--bridge-border);
      color: var(--text);
      box-shadow: 0 0 0 2px rgba(21,106,62,.18);
    }
    .form-control::placeholder { color: var(--muted); }
    .btn-primary {
      background: var(--bridge-border); border-color: var(--bridge-border);
      color: #ffffff;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 1.5px;
    }
    .btn-primary:hover { background: #0c6560; border-color: #0c6560; color: #ffffff; }
    .btn-outline-secondary {
      border-color: var(--border); color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 1px;
    }
    .btn-outline-secondary:hover { background: var(--surface2); border-color: var(--muted); color: var(--text); }

    /* ── Alert ── */
    .alert-danger { background: var(--alert-danger-bg); border-color: var(--alert-danger-border); color: var(--alert-danger-color); }
    .alert-info   { background: var(--alert-info-bg);   border-color: var(--alert-info-border);   color: var(--alert-info-color); }

    /* ── Links ── */
    a { color: var(--academic); text-decoration: none; }
    a:hover { color: var(--academic); text-decoration: underline; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--surface2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Page headings ── */
    .page-heading { color: var(--heading) !important; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
<script>
  /* ── Plotly theme helper — use in extra_js blocks ──────────────────────
     Returns a Plotly layout fragment with light-mode colours.
     Usage: Plotly.newPlot(el, traces, { ...getPlotlyTheme(), ...yourLayout });
  ── */
  function getPlotlyTheme() {
    return {
      paper_bgcolor: 'rgba(248,250,252,0)',
      plot_bgcolor:  'rgba(248,250,252,0)',
      font:   { color: '#475569', family: "'JetBrains Mono',monospace", size: 12 },
      xaxis:  { gridcolor: '#e2e8f0', tickfont: { color: '#475569' } },
      yaxis:  { gridcolor: '#e2e8f0', tickfont: { color: '#475569' } },
      legend: { font: { color: '#475569', size: 12 } },
    };
  }
</script>
